<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presupuestador Interno – Ecoenergy</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --g: #5DC133; --gl: #84D957; --gd: rgba(93,193,51,0.12);
  --bg: #0C0C0C; --s: #141814; --c: #1A201A;
  --b: rgba(93,193,51,0.22); --bs: rgba(255,255,255,0.06);
  --t: #F0F0F0; --tm: #888; --td: #444;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--t); font-family:'Barlow',sans-serif; min-height:100vh; }

/* HEADER */
.hdr { padding:20px 32px; display:flex; align-items:center; justify-content:space-between;
  border-bottom:1px solid var(--bs); background:var(--c); }
.hdr-logo { display:flex; align-items:center; gap:14px; }
.hdr-logo img { height:44px; }
.hdr-title { font-family:'Barlow Condensed',sans-serif; font-size:13px; letter-spacing:3px;
  text-transform:uppercase; color:var(--g); font-weight:700; }
.hdr-sub { font-size:10px; color:var(--tm); letter-spacing:2px; text-transform:uppercase; }
.hdr-badge { background:var(--gd); border:1px solid var(--b); border-radius:20px;
  padding:5px 14px; font-size:10px; color:var(--gl); letter-spacing:2px; font-weight:600;
  text-transform:uppercase; }

/* LAYOUT */
.wrap { display:grid; grid-template-columns:380px 1fr; min-height:calc(100vh - 70px); }

/* FORM PANEL */
.form-panel { background:var(--c); border-right:1px solid var(--bs); padding:28px 24px;
  overflow-y:auto; max-height:calc(100vh - 70px); position:sticky; top:70px; }

.fpanel-title { font-family:'Barlow Condensed',sans-serif; font-size:20px; font-weight:800;
  text-transform:uppercase; letter-spacing:2px; color:var(--g); margin-bottom:20px;
  padding-bottom:10px; border-bottom:1px solid var(--bs); }

.field { margin-bottom:14px; }
.label { font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--tm);
  font-weight:600; margin-bottom:5px; display:block; }
.inp { width:100%; background:var(--s); border:1.5px solid var(--bs); border-radius:7px;
  padding:9px 12px; color:var(--t); font-family:'Barlow',sans-serif; font-size:14px;
  outline:none; transition:border-color .2s; }
.inp:focus { border-color:var(--g); }
select.inp { cursor:pointer; }
input[type="number"].inp::-webkit-outer-spin-button,
input[type="number"].inp::-webkit-inner-spin-button { -webkit-appearance:none; }
input[type="number"].inp { -moz-appearance:textfield; }

.divider { border:none; border-top:1px solid var(--bs); margin:18px 0; }

.row2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

/* Slider */
.slider-wrap { display:flex; gap:12px; align-items:center; }
input[type="range"] { -webkit-appearance:none; flex:1; height:4px; background:var(--bs);
  border-radius:2px; outline:none; cursor:pointer; }
input[type="range"]::-webkit-slider-thumb { -webkit-appearance:none; width:18px; height:18px;
  background:var(--g); border-radius:50%; border:2px solid #111; }
.slider-val { font-family:'Space Mono',monospace; font-size:18px; color:var(--g);
  font-weight:700; min-width:36px; text-align:right; }
.slider-hint { font-size:10px; color:var(--td); margin-top:4px; }

/* Optional toggle */
.opt-toggle { display:flex; align-items:center; gap:8px; margin-bottom:10px; cursor:pointer; }
.opt-toggle input[type="checkbox"] { accent-color:var(--g); width:14px; height:14px; cursor:pointer; }
.opt-toggle span { font-size:11px; color:var(--tm); letter-spacing:1px; }

/* Generate button */
.gen-btn { width:100%; background:var(--g); color:#000; border:none; border-radius:9px;
  padding:14px; font-family:'Barlow Condensed',sans-serif; font-size:20px; font-weight:800;
  letter-spacing:2px; text-transform:uppercase; cursor:pointer; margin-top:20px;
  transition:all .2s; box-shadow:0 0 20px rgba(93,193,51,.25); display:flex;
  align-items:center; justify-content:center; gap:8px; }
.gen-btn:hover { filter:brightness(1.1); transform:scale(1.02); }
.gen-btn:disabled { opacity:.5; cursor:not-allowed; transform:none; }

/* PREVIEW PANEL */
.preview-panel { padding:28px; overflow-y:auto; max-height:calc(100vh - 70px); background:var(--bg); }
.preview-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
.preview-title { font-family:'Barlow Condensed',sans-serif; font-size:18px; font-weight:800;
  text-transform:uppercase; letter-spacing:2px; color:var(--tm); }
.download-btn { background:var(--g); color:#000; border:none; border-radius:8px;
  padding:10px 24px; font-family:'Barlow Condensed',sans-serif; font-size:16px; font-weight:800;
  letter-spacing:2px; text-transform:uppercase; cursor:pointer; transition:all .2s;
  display:flex; align-items:center; gap:8px; }
.download-btn:hover { filter:brightness(1.1); }
.download-btn:disabled { opacity:.4; cursor:not-allowed; }

/* PDF PREVIEW CONTAINER */
#pdfPreview { background:white; border-radius:10px; overflow:hidden;
  box-shadow:0 8px 40px rgba(0,0,0,.5); max-width:794px; margin:0 auto; }

/* ══════════════════════════════════════
   PDF CONTENT STYLES (white background)
   ══════════════════════════════════════ */
#pdfContent {
  background:#fff; width:794px; font-family:'Barlow',sans-serif; color:#1a1a1a;
  font-size:13px; line-height:1.5;
}

.pdf-header {
  background:#1A201A; padding:28px 36px 24px; display:flex;
  justify-content:space-between; align-items:flex-start;
}
.pdf-logo-area { display:flex; align-items:center; gap:16px; }
.pdf-logo-area img { height:56px; }
.pdf-brand { font-family:'Barlow Condensed',sans-serif; font-size:28px; font-weight:900;
  color:#5DC133; letter-spacing:2px; text-transform:uppercase; line-height:1; }
.pdf-brand-sub { font-size:10px; color:#888; letter-spacing:3px; text-transform:uppercase; margin-top:2px; }
.pdf-header-right { text-align:right; }
.pdf-presupuesto-label { font-family:'Barlow Condensed',sans-serif; font-size:42px; font-weight:900;
  color:white; line-height:1; letter-spacing:-1px; }
.pdf-date { font-size:11px; color:#888; margin-top:4px; letter-spacing:1px; }

/* Orange/green stripe */
.pdf-stripe { height:6px; background:linear-gradient(90deg, #5DC133, #84D957, #5DC133); }

/* Client section */
.pdf-section { padding:20px 36px; border-bottom:1px solid #eee; }
.pdf-section-title { font-family:'Barlow Condensed',sans-serif; font-size:12px; font-weight:700;
  text-transform:uppercase; letter-spacing:3px; color:#5DC133; margin-bottom:10px; }
.pdf-client-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.pdf-client-item label { font-size:10px; text-transform:uppercase; letter-spacing:1px;
  color:#888; display:block; margin-bottom:2px; }
.pdf-client-item .val { font-size:14px; font-weight:600; color:#1a1a1a; }

/* System config table */
.pdf-table { width:100%; border-collapse:collapse; margin-top:6px; }
.pdf-table th { background:#1A201A; color:#5DC133; padding:8px 12px; text-align:left;
  font-size:10px; letter-spacing:2px; text-transform:uppercase; font-weight:600; }
.pdf-table td { padding:8px 12px; border-bottom:1px solid #f0f0f0; font-size:13px; color:#333; }
.pdf-table tr:last-child td { border-bottom:none; }
.pdf-table tr:nth-child(even) td { background:#f9f9f9; }
.pdf-table .green { color:#2E7D32; font-weight:700; }
.pdf-table .bold { font-weight:700; color:#1a1a1a; }

/* Big numbers */
.pdf-metrics { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin:4px 0; }
.pdf-metric { background:#f5f5f5; border-radius:8px; padding:14px; text-align:center;
  border-top:3px solid #5DC133; }
.pdf-metric .m-val { font-family:'Space Mono',monospace; font-size:22px; font-weight:700;
  color:#2E7D32; line-height:1; }
.pdf-metric .m-label { font-size:9px; text-transform:uppercase; letter-spacing:2px;
  color:#888; margin-top:4px; }

.pdf-metric.highlight { background:#E8F5E9; }
.pdf-metric.orange { border-top-color:#FF8800; }
.pdf-metric.orange .m-val { color:#E65100; }

/* Coverage bar */
.pdf-cov-bar-bg { height:10px; background:#eee; border-radius:5px; overflow:hidden; margin:8px 0 4px; }
.pdf-cov-bar-fill { height:100%; background:linear-gradient(90deg,#5DC133,#84D957); border-radius:5px; }

/* Projection table */
.pdf-proj-grid { display:grid; grid-template-columns:repeat(10,1fr); gap:4px; margin-top:6px; }
.pdf-proj-cell { background:#f5f5f5; border-radius:4px; padding:8px 4px; text-align:center; }
.pdf-proj-cell.paid { background:#E8F5E9; }
.pdf-proj-cell.payback { background:#2E7D32; color:white; }
.pdf-proj-cell .py { font-size:9px; text-transform:uppercase; color:#888; letter-spacing:1px; }
.pdf-proj-cell.payback .py { color:rgba(255,255,255,.7); }
.pdf-proj-cell .pv { font-size:10px; font-weight:700; color:#333; margin-top:2px; }
.pdf-proj-cell.paid .pv { color:#2E7D32; }
.pdf-proj-cell.payback .pv { color:white; }

/* Footer */
.pdf-footer { background:#1A201A; padding:16px 36px; display:flex;
  justify-content:space-between; align-items:center; }
.pdf-footer-left { font-size:11px; color:#888; }
.pdf-footer-left strong { color:#5DC133; }
.pdf-footer-note { font-size:10px; color:#555; text-align:right; font-style:italic; }

/* Quote box */
.pdf-callout { background:#E8F5E9; border-left:4px solid #5DC133; border-radius:4px;
  padding:12px 16px; margin:6px 0; }
.pdf-callout .c-title { font-size:11px; font-weight:700; color:#2E7D32; text-transform:uppercase;
  letter-spacing:1px; margin-bottom:3px; }
.pdf-callout .c-text { font-size:12px; color:#333; }

@media print { body { background:white; } .form-panel, .preview-header { display:none; } }
</style>
</head>

<script>
// ── HSP MENSUAL ROSARIO (E-Cologica / Ecoenergy) ──
const HSP_MONTHLY = [6.29,5.75,5.43,4.56,4.08,2.79,3.25,4.03,4.68,5.55,5.64,6.20];
const MESES = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const DIAS_MES = [31,28,31,30,31,30,31,31,30,31,30,31];

function buildGenChart(panels) {
  const W = 340, H = 180, padL = 44, padB = 28, padT = 10, padR = 8;
  const chartW = W - padL - padR;
  const chartH = H - padT - padB;
  const barW = Math.floor(chartW / 12) - 3;

  // monthly kWh
  const vals = HSP_MONTHLY.map((hsp, i) => Math.round(panels * 450 * hsp * DIAS_MES[i] / 1000));
  const maxV = Math.max(...vals);
  const yStep = Math.ceil(maxV / 4 / 50) * 50;
  const yMax = yStep * 4;

  let bars = '', labels = '', ylines = '', yTicks = '';

  // Y grid lines
  for (let i = 0; i <= 4; i++) {
    const yv = i * yStep;
    const y = padT + chartH - (yv / yMax) * chartH;
    ylines += `<line x1="${padL}" y1="${y}" x2="${W - padR}" y2="${y}" stroke="#eee" stroke-width="1"/>`;
    yTicks += `<text x="${padL - 4}" y="${y + 4}" text-anchor="end" font-size="8" fill="#999">${yv}</text>`;
  }

  vals.forEach((v, i) => {
    const barH = (v / yMax) * chartH;
    const x = padL + i * (chartW / 12) + 2;
    const y = padT + chartH - barH;
    const isMin = i === 5; // Junio = mínimo
    const isMax = i === 0; // Enero = máximo
    const fill = isMin ? '#FF8800' : '#5DC133';
    bars += `<rect x="${x}" y="${y}" width="${barW}" height="${barH}" fill="${fill}" rx="2" opacity="0.9"/>`;
    if (v === maxV || v === Math.min(...vals) || i === 5 || i === 0) {
      bars += `<text x="${x + barW/2}" y="${y - 3}" text-anchor="middle" font-size="7" fill="${fill}" font-weight="bold">${v}</text>`;
    }
    labels += `<text x="${x + barW/2}" y="${H - 4}" text-anchor="middle" font-size="7.5" fill="#888">${MESES[i]}</text>`;
  });

  return `<svg width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg" style="display:block;">
    <rect width="${W}" height="${H}" fill="#fafafa" rx="6"/>
    ${ylines}${yTicks}
    <line x1="${padL}" y1="${padT}" x2="${padL}" y2="${padT + chartH}" stroke="#ccc" stroke-width="1"/>
    <line x1="${padL}" y1="${padT + chartH}" x2="${W - padR}" y2="${padT + chartH}" stroke="#ccc" stroke-width="1"/>
    ${bars}${labels}
    <text x="${padL + chartW/2}" y="${H}" text-anchor="middle" font-size="8" fill="#aaa">Mes</text>
  </svg>`;
}

function buildSavingsChart(r) {
  if (!r.annualSaveArs || !r.sysUsd) {
    return `<div style="background:#f5f5f5;border-radius:6px;height:180px;display:flex;align-items:center;justify-content:center;color:#aaa;font-size:12px;">Ingresá los datos de la factura para ver este gráfico</div>`;
  }

  const W = 340, H = 180, padL = 52, padB = 28, padT = 14, padR = 8;
  const chartW = W - padL - padR;
  const chartH = H - padT - padB;
  const years = 10;

  // Cumulative savings in USD per year
  const cumUsd = [];
  let cum = 0;
  for (let y = 1; y <= years; y++) {
    cum += (r.annualSaveArs * Math.pow(1.40, y - 1)) / r.sysArs * r.sysUsd;
    cumUsd.push(Math.round(cum));
  }
  const maxV = Math.max(cumUsd[years - 1], r.sysUsd) * 1.08;
  const paybackFloor = r.payback ? Math.floor(r.payback) : 99;

  // Y ticks
  const yStepRaw = maxV / 4;
  const yStep = Math.ceil(yStepRaw / 500) * 500;
  const yMax = yStep * 4;

  let areas = '', dots = '', xLabels = '', ylines = '', yTicks = '';
  const points = cumUsd.map((v, i) => {
    const x = padL + (i + 1) * (chartW / years);
    const y = padT + chartH - Math.min(v, yMax) / yMax * chartH;
    return { x, y, v, year: i + 1 };
  });

  // Y grid
  for (let i = 0; i <= 4; i++) {
    const yv = i * yStep;
    const y = padT + chartH - (yv / yMax) * chartH;
    ylines += `<line x1="${padL}" y1="${y}" x2="${W - padR}" y2="${y}" stroke="#eee" stroke-width="1"/>`;
    yTicks += `<text x="${padL - 4}" y="${y + 4}" text-anchor="end" font-size="7.5" fill="#999">${yv >= 1000 ? (yv/1000).toFixed(0)+'K' : yv}</text>`;
  }

  // Investment line (dashed)
  const invY = padT + chartH - (r.sysUsd / yMax) * chartH;
  const invLine = `<line x1="${padL}" y1="${invY}" x2="${W - padR}" y2="${invY}" stroke="#FF8800" stroke-width="1.5" stroke-dasharray="5,3"/>
    <text x="${W - padR - 2}" y="${invY - 4}" text-anchor="end" font-size="8" fill="#FF8800" font-weight="bold">Inversión USD ${Math.round(r.sysUsd).toLocaleString('es-AR')}</text>`;

  // Area fill
  const polyPts = [`${padL},${padT + chartH}`, ...points.map(p => `${p.x},${p.y}`), `${points[points.length-1].x},${padT + chartH}`].join(' ');
  areas = `<polygon points="${polyPts}" fill="rgba(93,193,51,0.12)"/>`;

  // Line
  const linePts = points.map(p => `${p.x},${p.y}`).join(' ');
  areas += `<polyline points="${linePts}" fill="none" stroke="#5DC133" stroke-width="2"/>`;

  // Dots and labels
  points.forEach(p => {
    const isPayback = p.year === paybackFloor + 1 || (r.payback && p.year === Math.ceil(r.payback));
    const recovered = r.payback && p.year > r.payback;
    const color = recovered || isPayback ? '#2E7D32' : '#5DC133';
    dots += `<circle cx="${p.x}" cy="${p.y}" r="${isPayback ? 5 : 3}" fill="${color}" stroke="white" stroke-width="1.5"/>`;
    if (isPayback) {
      dots += `<text x="${p.x}" y="${p.y - 8}" text-anchor="middle" font-size="8" fill="#2E7D32" font-weight="bold">✓ Recupero</text>`;
    }
    xLabels += `<text x="${p.x}" y="${H - 4}" text-anchor="middle" font-size="7.5" fill="#888">${p.year}</text>`;
  });

  return `<svg width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg" style="display:block;">
    <rect width="${W}" height="${H}" fill="#fafafa" rx="6"/>
    ${ylines}${yTicks}
    <line x1="${padL}" y1="${padT}" x2="${padL}" y2="${padT + chartH}" stroke="#ccc" stroke-width="1"/>
    <line x1="${padL}" y1="${padT + chartH}" x2="${W - padR}" y2="${padT + chartH}" stroke="#ccc" stroke-width="1"/>
    ${invLine}
    ${areas}${dots}${xLabels}
    <text x="${padL + chartW/2}" y="${H}" text-anchor="middle" font-size="8" fill="#aaa">Año</text>
  </svg>`;
}

// ── HELPERS ──
const PRICING = {
  inverter: { '3kw': 960, '6.2kw': 1080, '8.2kw': 1600 },

  litio: 1700,
  install: 600,

function toggleConsumoFields() {

  document.getElementById('consumoDefault').style.display = checked ? 'none' : 'block';

function calcSistema(inv, panels, bat, kwh_bim, ars_bim, dolar, horas) {
  const monthlykWh = kwh_bim / 2;
  const monthlyArs = ars_bim / 2;

  // Generación
  const dailyGen = panels * PANEL_W * HSP;
  const monthlyGen = dailyGen * 30 / 1000;

  // Cobertura
  const directEff = 0.55 + (horas / 12) * 0.30;
  let batUsable = 0;
  let batLabel = '';
  let batCount = '';
  if (bat === 'sinbat') {
    batUsable = 0; batLabel = 'Sin batería'; batCount = '—';
  } else if (bat === 'litio' && inv !== '3kw') {
    batUsable = 4.8; batLabel = '1× Litio Blunery 51.2V-100Ah'; batCount = '1 unidad';
  } else {
    const n = PRICING.gelCount[inv];
    const v = inv === '3kw' ? 24 : 48;
    batUsable = Math.round(v * 100 / 1000 * 0.7 * 10) / 10;
    batLabel = `${n}× Gel 100Ah (${v}V)`; batCount = `${n} unidades`;
  }

  const batMonthly = batUsable * 26;
  const totalUsable = monthlyGen * directEff + batMonthly;
  const coverage = Math.min(1, totalUsable / monthlykWh);

  const monthlySaveArs = monthlyArs * coverage;
  const annualSaveArs = monthlySaveArs * 12;

  // Costo sistema
  const invCost = PRICING.inverter[inv];
  const panelCost = panels * PRICING.panelUnit;
  let batCost = 0;
  if (bat === 'sinbat') batCost = 0;
  else if (bat === 'litio' && inv !== '3kw') batCost = PRICING.litio;
  else batCost = PRICING.gelCount[inv] * PRICING.gelUnit;
  const sysUsd = invCost + panelCost + batCost + PRICING.install;
  const sysArs = sysUsd * dolar;

  // Payback con escalación 40% anual
  let payback = null;
  let cum = 0;
  for (let y = 1; y <= 25; y++) {
    const prev = cum;
    cum += annualSaveArs * Math.pow(1.40, y - 1);
    if (cum >= sysArs) {
      payback = Math.round(((y - 1) + (sysArs - prev) / (annualSaveArs * Math.pow(1.40, y - 1))) * 10) / 10;
      break;
    }
  }

  // Proyección 10 años
  const proj = [];
  let cumUsd = 0;
  for (let y = 1; y <= 10; y++) {
    cumUsd += (annualSaveArs * Math.pow(1.40, y - 1)) / dolar;
    proj.push({ year: y, cumUsd: Math.round(cumUsd), yearSave: Math.round(annualSaveArs * Math.pow(1.40, y-1)) });
  }

  return {
    dailyGen: Math.round(dailyGen / 1000 * 10) / 10,
    monthlyGen: Math.round(monthlyGen),
    monthlykWh: Math.round(monthlykWh),
    coverage: Math.round(coverage * 100),
    monthlySaveArs: Math.round(monthlySaveArs),
    annualSaveArs: Math.round(annualSaveArs),
    monthlySaveUsd: Math.round(monthlySaveArs / dolar),
    sysUsd, sysArs: Math.round(sysArs),
    payback, proj,
    batUsable, batLabel, batCount,
    tarifa: Math.round(ars_bim / kwh_bim),
    ratePerKwh: Math.round(ars_bim / kwh_bim)
  };
}

function fmt(n) { return n.toLocaleString('es-AR'); }
function today() {
  const d = new Date();
  return d.toLocaleDateString('es-AR', { day:'2-digit', month:'long', year:'numeric' });
}

  const html = `

async function descargarPDF() {
  const btn = document.getElementById('downloadBtn');
  const nombre = btn.dataset.nombre || 'cliente';
  btn.disabled = true;
  btn.textContent = '⏳ Generando...';

  const element = document.getElementById('pdfContent');
  const opt = {
    margin: 0,
    filename: `Presupuesto_Ecoenergy_${nombre.replace(/\s+/g,'_')}.pdf`,
    image: { type: 'jpeg', quality: 0.96 },
    html2canvas: { scale: 2, useCORS: true, logging: false, width: 794 },
    jsPDF: { unit: 'px', format: [794, element.scrollHeight + 2], orientation: 'portrait' }
  };

  try {
    await html2pdf().set(opt).from(element).save();
  } catch(e) {
    console.error(e);
    alert('Error al generar el PDF. Intentá de nuevo.');
  }

  btn.disabled = false;
  btn.innerHTML = '⬇ Descargar PDF';
}

// Auto-fetch dólar BNA
(async function() {
  try {
    const res = await fetch('https://dolarapi.com/v1/dolares/oficial');
    const d = await res.json();
    if (d.venta) document.getElementById('fDolar').value = Math.round(d.venta);
  } catch(e) {}
})();
</script>
